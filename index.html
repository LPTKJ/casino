<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>英皇娱乐 · 432.COM</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #0a0404; color: #ffd700; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
    .loader { width: 50px; height: 50px; border: 3px solid #333; border-top-color: #d4a526; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader"></div>
    <p>正在连接服务器...</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://wovjtvgqedisnupmgbnd.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_2WmHh_uodkRAisAOWawwgg_L3uOJph7';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadApp() {
      try {
        // 先尝试从 app_config 读取远程版本
        const { data, error } = await supabase
          .from('app_config')
          .select('*')
          .order('update_time', { ascending: false })
          .limit(1);

        if (error || !data.length) {
          // 没有远程配置，直接加载本地文件
          loadLocalFiles();
          return;
        }

        const config = data[0];
        if (config.css_url) {
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = config.css_url;
          document.head.appendChild(link);
        }
        const script = document.createElement('script');
        script.src = config.js_url || 'app.js';
        script.onload = () => {
          document.getElementById('loading').style.display = 'none';
          if (window.initApp) window.initApp(supabase);
        };
        script.onerror = () => {
          document.getElementById('loading').innerHTML = '<p style="color:red;">加载失败，请刷新重试</p>';
        };
        document.head.appendChild(script);
      } catch (e) {
        loadLocalFiles();
      }
    }

    function loadLocalFiles() {
      // 加载本地 CSS
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'app.css';
      document.head.appendChild(link);
      // 加载本地 JS
      const script = document.createElement('script');
      script.src = 'app.js';
      script.onload = () => {
        document.getElementById('loading').style.display = 'none';
        if (window.initApp) window.initApp(supabase);
      };
      script.onerror = () => {
        document.getElementById('loading').innerHTML = '<p style="color:red;">加载失败，请检查 app.js 是否存在</p>';
      };
      document.head.appendChild(script);
    }

    loadApp();
  </script>
</body>
</html>
