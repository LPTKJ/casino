<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>英皇娱乐 · 432.COM</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="app.css">
  <style>
    body { background: #0a0404; color: #ffd700; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
    .loader { width: 50px; height: 50px; border: 3px solid #333; border-top-color: #d4a526; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading" style="position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:9999;background:#0a0404;">
    <div class="loader"></div>
    <p>正在加载...</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://wovjtvgqedisnupmgbnd.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_2WmHh_uodkRAisAOWawwgg_L3uOJph7';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 带超时的获取函数
    async function fetchWithTimeout(promise, timeoutMs = 5000) {
      let timer;
      const timeout = new Promise((resolve, reject) => {
        timer = setTimeout(() => reject(new Error('请求超时')), timeoutMs);
      });
      return Promise.race([promise, timeout]).finally(() => clearTimeout(timer));
    }

    // 尝试从云端加载最新版本
    async function tryLoadCloudVersion() {
      try {
        const { data, error } = await fetchWithTimeout(
          supabase.from('app_config').select('*').order('update_time', { ascending: false }).limit(1)
        );
        
        if (error || !data || data.length === 0) {
          console.log('未找到云端配置，使用本地文件');
          return null;
        }

        const config = data[0];
        // 验证URL是否有效
        if (!config.js_url || config.js_url.trim() === '') {
          console.log('云端JS URL为空，使用本地文件');
          return null;
        }
        
        return config;
      } catch (e) {
        console.log('云端配置加载失败，使用本地文件', e);
        return null;
      }
    }

    // 加载本地文件
    function loadLocalApp() {
      const script = document.createElement('script');
      script.src = 'app.js';
      script.onload = () => {
        setTimeout(() => {
          const loader = document.getElementById('loading');
          if (loader) loader.style.display = 'none';
        }, 500);
        if (window.initApp) {
          window.initApp(supabase);
        }
      };
      script.onerror = () => {
        document.getElementById('loading').innerHTML = '<p style="color:red;">加载失败，请检查 app.js 是否存在</p>';
      };
      document.head.appendChild(script);
    }

    // 加载云端版本
    function loadCloudApp(config) {
      // 加载远程CSS
      if (config.css_url) {
        const existingLinks = document.querySelectorAll('link[rel="stylesheet"]');
        const hasCloudCSS = Array.from(existingLinks).some(link => link.href === config.css_url);
        if (!hasCloudCSS) {
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = config.css_url;
          document.head.appendChild(link);
        }
      }

      const script = document.createElement('script');
      script.src = config.js_url;
      script.onload = () => {
        setTimeout(() => {
          const loader = document.getElementById('loading');
          if (loader) loader.style.display = 'none';
        }, 500);
        if (window.initApp) {
          window.initApp(supabase);
        } else {
          console.error('云端app.js未定义initApp');
          loadLocalApp(); // 回退到本地
        }
      };
      script.onerror = () => {
        console.log('云端JS加载失败，回退到本地文件');
        loadLocalApp();
      };
      document.head.appendChild(script);
    }

    // 主启动流程
    async function startApp() {
      const cloudConfig = await tryLoadCloudVersion();
      
      if (cloudConfig) {
        console.log('加载云端版本:', cloudConfig.version);
        loadCloudApp(cloudConfig);
      } else {
        console.log('加载本地版本');
        loadLocalApp();
      }
    }

    startApp();
  </script>
</body>
</html>
