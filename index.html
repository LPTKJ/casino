<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>英皇娱乐 · 432.COM</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="app.css">
  <style>
    body { background: #0a0404; }
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; background: #0a0404; color: #ffd700; font-family: sans-serif;
    }
    .loader {
      width: 50px; height: 50px; border: 3px solid #333;
      border-top-color: #d4a526; border-radius: 50%;
      animation: spin 1s linear infinite; margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader"></div>
    <p>正在加载...</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://wovjtvgqedisnupmgbnd.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_2WmHh_uodkRAisAOWawwgg_L3uOJph7';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 移除加载画面
    function hideLoading() {
      const loader = document.getElementById('loading');
      if (loader) loader.style.display = 'none';
    }

    // 加载本地完整 app.js
    function loadLocalApp() {
      const script = document.createElement('script');
      script.src = 'app.js';
      script.onload = function() {
        setTimeout(hideLoading, 500);
        if (window.initApp) {
          window.initApp(supabase);
        } else {
          console.error('app.js 未定义 initApp');
        }
      };
      script.onerror = function() {
        document.getElementById('loading').innerHTML = '<p style="color:red;">加载失败，请刷新</p>';
      };
      document.head.appendChild(script);
    }

    // 尝试云更新（最多等5秒）
    async function tryCloudUpdate() {
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000);

        const { data, error } = await supabase
          .from('app_config')
          .select('*')
          .order('update_time', { ascending: false })
          .limit(1)
          .abortSignal(controller.signal);

        clearTimeout(timeout);

        if (error || !data || data.length === 0 || !data[0].js_url) {
          return false; // 没有云配置，使用本地文件
        }

        const config = data[0];
        // 加载远程CSS
        if (config.css_url) {
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = config.css_url;
          document.head.appendChild(link);
        }
        // 加载远程JS
        const script = document.createElement('script');
        script.src = config.js_url;
        script.onload = function() {
          setTimeout(hideLoading, 500);
          if (window.initApp) {
            window.initApp(supabase);
          } else {
            console.error('云端JS未定义initApp，回退本地');
            loadLocalApp();
          }
        };
        script.onerror = function() {
          console.log('云端JS加载失败，回退本地');
          loadLocalApp();
        };
        document.head.appendChild(script);
        return true;
      } catch (e) {
        console.log('云更新检查失败，使用本地文件', e);
        return false;
      }
    }

    // 启动流程
    (async function start() {
      const cloudLoaded = await tryCloudUpdate();
      if (!cloudLoaded) {
        loadLocalApp();
      }
    })();
  </script>
</body>
</html>
