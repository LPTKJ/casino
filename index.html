<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
    body{background:#0a0404;color:#c8b898;max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:75px;overflow-x:hidden;user-select:none;-webkit-tap-highlight-color:transparent}
    body.theme-gold{background:#1a1000;color:#f0dcc0}
    body.theme-obsidian{background:#000;color:#ccc}
    body.theme-royal{background:#0a0030;color:#d4c0f0}
    body.theme-diamond{background:linear-gradient(135deg,#0a0a2a,#1a1a4a);color:#e0e8ff}
    .top-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:linear-gradient(180deg,#1a0a06,#0f0503);border-bottom:2px solid #3d2010;position:sticky;top:0;z-index:100}
    .avatar-wrap{position:relative;width:30px;height:30px}
    .avatar-img{width:30px;height:30px;border-radius:50%;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:15px;background:#1a0a05}
    .avatar-frame{position:absolute;inset:-3px;border-radius:50%;pointer-events:none}
    .f0{border:2px solid #888}.f1{border:2px solid #cd7f32}.f2{border:2px solid #c0c0c0}.f3{border:2px solid #ffd700}
    .f4{border:2px solid #ff8c00;box-shadow:0 0 10px #ff8c00;animation:frameGlow 1.5s infinite}
    .f5{border:2px solid #ff00ff;box-shadow:0 0 14px #ff00ff;animation:frameRainbow 1s infinite}
    .f6{border:2px solid #ff69b4;box-shadow:0 0 16px #ff69b4;animation:frameGlow 1s infinite}
    .f7{border:2px solid #fff;box-shadow:0 0 18px #fff;animation:frameGlow .8s infinite}
    .f8{border:2px solid #ffd700;box-shadow:0 0 20px #ffd700,0 0 30px #ff8c00}
    .f9{border:2px solid #ff0000;box-shadow:0 0 22px #ff0000,0 0 35px #ffd700;animation:frameRainbow .8s infinite}
    .f10{border:3px solid #000;box-shadow:0 0 25px #ffd700,0 0 40px #ff00ff,0 0 55px #fff;animation:frameGlow .6s infinite}
    @keyframes frameGlow{0%,100%{box-shadow:0 0 8px currentColor}50%{box-shadow:0 0 20px currentColor}}
    @keyframes frameRainbow{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
    .name{font-size:10px;font-weight:bold;color:#f5d060;max-width:55px;overflow:hidden;text-overflow:ellipsis}
    .bal{font-size:9px;color:#d4a526}
    .vip-tag{font-size:7px;padding:1px 5px;border-radius:7px;font-weight:bold;color:#000}
    .btn{padding:4px 8px;border-radius:10px;font-size:9px;font-weight:bold;border:none;cursor:pointer}
    .btn-dep{background:#d4a526;color:#000}.btn-wd{background:transparent;border:1px solid #d4a526;color:#d4a526}
    .route-bar{background:#0a0404;padding:3px 8px;font-size:9px;border-bottom:1px solid #2a1a0f;display:flex;align-items:center;gap:5px;cursor:pointer}
    .route-dot{width:6px;height:6px;border-radius:50%;background:#2ecc71;animation:dotBlink 1.5s infinite}
    @keyframes dotBlink{0%,100%{opacity:1}50%{opacity:0.3}}
    .marquee{background:#0a0504;border-bottom:1px solid #1f140c;overflow:hidden;height:20px;line-height:20px}
    .marquee-inner{white-space:nowrap;animation:scroll 25s linear infinite;padding-left:16px;font-size:9px;color:#f0b830}
    @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    .page{display:none}.page.active{display:block}
    .hero{margin:6px 8px;background:linear-gradient(145deg,#1a0808,#2d0e0e);border-radius:10px;padding:18px 12px;text-align:center;border:1px solid #4a1a1a;cursor:pointer}
    .hero h2{color:#ffd700;font-size:20px}.cta{display:inline-block;margin-top:8px;background:linear-gradient(90deg,#c92a2a,#e8590c);padding:10px 24px;border-radius:20px;font-size:13px;font-weight:bold;color:#fff;cursor:pointer}
    .game-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:0 8px;margin-bottom:6px}
    .game-card{background:#1a110a;border-radius:8px;overflow:hidden;text-align:center;cursor:pointer;border:1px solid #2a1a0f}.game-card:active{border-color:#d4a526}
    .game-img{height:62px;display:flex;align-items:center;justify-content:center;font-size:28px;background:linear-gradient(135deg,#2a1010,#3d1818)}.game-name{padding:5px;font-size:10px;color:#b8a080}
    .act-card{background:linear-gradient(135deg,#1a0e20,#0d0615);border-radius:8px;padding:11px;margin:4px 8px;cursor:pointer;border:1px solid #2a1530}
    .act-badge{position:absolute;top:4px;right:4px;background:#c92a2a;color:#fff;font-size:6px;padding:2px 5px;border-radius:4px}
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0a0504;display:grid;grid-template-columns:repeat(8,1fr);padding:4px 0 5px;border-top:2px solid #1a100a;z-index:200}
    .nav-item{text-align:center;cursor:pointer;color:#6b5e50;font-size:7px}.nav-item.active{color:#ffd700}.nav-icon{font-size:14px;display:block}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:300;align-items:center;justify-content:center}.modal.show{display:flex}
    .modal-box{background:#1a100a;width:90%;max-width:380px;max-height:85vh;overflow-y:auto;border-radius:10px;border:1px solid #3a2515;padding:14px}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.modal-header h4{color:#ffd700;font-size:14px}
    .modal-close{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:12px;cursor:pointer}
    .input{width:100%;padding:8px;margin:5px 0;background:#0a0504;border:1px solid #3a2515;color:#fff;border-radius:4px;font-size:11px}
    .btn-block{width:100%;padding:10px;background:#d4a526;color:#000;border:none;border-radius:6px;font-weight:bold;font-size:13px;cursor:pointer;margin:5px 0}
    .btn-sm{background:#d4a526;color:#000;padding:4px 10px;border-radius:6px;border:none;font-weight:bold;cursor:pointer;font-size:9px;margin:2px}
    .toast{position:fixed;top:45px;left:50%;transform:translateX(-50%);background:#1a100a;color:#ffd700;padding:7px 14px;border-radius:12px;font-size:10px;z-index:500;border:1px solid #d4a526;pointer-events:none;opacity:0;transition:0.3s;white-space:nowrap}.toast.show{opacity:1}
    .qr-img{width:150px;height:150px;background:#fff;margin:8px auto;display:block;border:2px solid #d4a526;border-radius:4px;object-fit:contain}
    .pay-tabs{display:flex;gap:4px;margin-bottom:6px}.pay-tab{flex:1;padding:6px;text-align:center;background:#1a100a;border:1px solid #3a2515;border-radius:4px;cursor:pointer;color:#c0a060;font-size:10px}.pay-tab.sel{background:#d4a526;color:#000}
    .admin-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:600;flex-direction:column}.admin-panel.show{display:flex}
    .admin-tabs{display:flex;flex-wrap:wrap;gap:3px;padding:6px;background:#0a0404}.admin-tab{padding:4px 8px;background:#1a100a;border:1px solid #3a2515;border-radius:3px;color:#c0b098;cursor:pointer;font-size:9px}.admin-tab.active{background:#d4a526;color:#000}
    .admin-content{flex:1;overflow-y:auto;padding:10px}
    .chat-box{height:180px;overflow-y:auto;background:#0a0504;border:1px solid #3a2515;padding:6px;margin:6px 0;border-radius:4px}
    .chat-msg{padding:4px 7px;border-radius:6px;max-width:80%;font-size:10px;margin:3px 0}.chat-msg.admin{background:#1a2a1a;color:#6ee7b7}.chat-msg.user{background:#1a1a2a;color:#d4a526}.chat-msg.ai{background:#1a1a2a;color:#60a5fa}
    .pwd-dialog{background:#1a100a;padding:16px;border:2px solid #d4a526;border-radius:8px;text-align:center;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:700;display:none}
    .img-zoom{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:800;display:none;align-items:center;justify-content:center;cursor:pointer}.img-zoom.show{display:flex}.img-zoom img{max-width:95%;max-height:90%;border:2px solid #d4a526;border-radius:6px}
    .stage-post{background:#1a100a;border-radius:7px;padding:10px;margin:5px 6px;border:1px solid #2a1a0f}.stage-post img{width:100%;max-height:180px;object-fit:contain;border-radius:4px;margin-top:4px}
    .room-msg{background:#1a100a;margin:3px 6px;padding:6px 8px;border-radius:6px;font-size:10px;display:flex;gap:6px;align-items:flex-start}
    .red-packet{display:inline-block;background:#c92a2a;color:#ffd700;padding:4px 10px;border-radius:14px;font-size:10px;cursor:pointer;animation:packetPulse 1s infinite}@keyframes packetPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    .user-table{width:100%;font-size:8px;border-collapse:collapse;margin:5px 0}.user-table th,.user-table td{padding:3px;border:1px solid #2a1a0f;text-align:center}.user-table th{background:#1a100a;color:#d4a526}
    .dice-cube{width:50px;height:50px;margin:8px auto;position:relative;transform-style:preserve-3d}.dice-cube.rolling{animation:diceRoll 0.7s ease-out}@keyframes diceRoll{0%{transform:rotateX(0)rotateY(0)}100%{transform:rotateX(720deg)rotateY(360deg)}}
    .dice-face{position:absolute;width:50px;height:50px;background:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;border:2px solid #333;color:#000}
    .dice-face:nth-child(1){transform:translateZ(25px)}.dice-face:nth-child(2){transform:rotateY(180deg)translateZ(25px)}.dice-face:nth-child(3){transform:rotateY(-90deg)translateZ(25px)}.dice-face:nth-child(4){transform:rotateY(90deg)translateZ(25px)}.dice-face:nth-child(5){transform:rotateX(90deg)translateZ(25px)}.dice-face:nth-child(6){transform:rotateX(-90deg)translateZ(25px)}
    .slot-row{display:flex;justify-content:center;gap:5px;margin:10px 0}.slot-reel{width:48px;height:54px;background:#1a100a;border:2px solid #3a2515;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}.slot-reel.spin{animation:reelSpin 0.1s linear infinite}@keyframes reelSpin{0%{transform:translateY(-10px)}50%{transform:translateY(10px)}100%{transform:translateY(-10px)}}
    .poker-cards{display:flex;justify-content:center;gap:12px;margin:10px 0}.poker-card{width:46px;height:62px;background:#fff;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:20px;font-weight:bold;border:2px solid #ccc;color:#000;transition:0.3s}.poker-card.flip{animation:cardFlip 0.4s ease}@keyframes cardFlip{0%{transform:rotateY(0)}50%{transform:rotateY(90deg)}100%{transform:rotateY(0)}}
    .night-item{background:#1a100a;margin:5px 6px;padding:10px;border-radius:7px;display:flex;gap:8px;align-items:center}.night-item img{width:60px;height:60px;object-fit:cover;border-radius:4px}
  </style>
</head>
<body>

<div class="top-bar">
  <div class="user-area" onclick="switchPage('profile')">
    <div class="avatar-wrap"><div class="avatar-img" id="avatarDisplay">👤</div><div class="avatar-frame f0" id="avatarFrame"></div></div>
    <div><span class="name" id="displayNickname">游客</span><br><span class="bal">💰 <b id="displayBalance">0.00</b></span></div>
    <span class="vip-tag" id="displayVip" style="background:#888;">游客</span>
  </div>
  <div><button class="btn btn-dep" onclick="openDeposit()">📥存款</button> <button class="btn btn-wd" onclick="openWithdraw()">📤提现</button></div>

<div class="route-bar" onclick="switchRoute()"><div class="route-dot"></div><span id="routeText">线路01·PG专线</span><span style="color:#2ecc71;margin-left:auto;" id="routeDelay">12ms</span></div>
<div class="marquee"><div class="marquee-inner" id="marqueeText"></div></div>
<div class="toast" id="toast"></div>

<div class="page active" id="page-home"></div>
<div class="page" id="page-activity"></div>
<div class="page" id="page-earn"></div>
<div class="page" id="page-stage"></div>
<div class="page" id="page-night"></div>

<div class="page" id="page-profile"></div>

<div class="modal" id="gameModal"><div class="modal-box" id="gameModalContent"></div></div>
<div class="modal" id="payModal"><div class="modal-box" id="payModalContent"></div></div>
<div class="modal" id="chatModal"><div class="modal-box" id="chatModalContent"></div></div>
<div class="modal" id="registerModal"><div class="modal-box" id="registerModalContent"></div></div>
<div class="img-zoom" id="imgZoom" onclick="this.classList.remove('show')"><img id="imgZoomImg" src=""></div>

<div class="admin-panel" id="adminPanel">
  <div class="admin-tabs" id="adminTabs"></div>
  <div class="admin-content" id="adminContent"></div>
</div>
<div class="pwd-dialog" id="pwdDialog">
  <button class="modal-close" onclick="document.getElementById('pwdDialog').style.display='none'" style="position:absolute;top:8px;right:8px;">✕</button>
  <h4 style="color:#ffd700;">管理员验证</h4>
  <input id="pwdInput" type="password" placeholder="密码" style="width:100%;padding:8px;background:#0a0504;border:1px solid #3a2515;color:#fff;border-radius:4px;text-align:center;">
  <button class="btn-block" onclick="checkAdminPwd()">确认</button>
</div>

<script>
// ========== Supabase ==========
const SUPABASE_URL = 'https://wovjtvgqedisnupmgbnd.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_2WmHh_uodkRAisAOWawwgg_L3uOJph7';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
const VIP_NAMES = {0:'VIP0',1:'VIP1',2:'VIP2',3:'VIP3',4:'VIP4',5:'荣耀VIP5',6:'伯爵VIP6',7:'至尊VIP7',8:'黑金VIP8',9:'SVIP9',10:'神豪SVIP10'};

// 直接渲染页面，无加载动画
function renderHome() {
  document.getElementById('page-home').innerHTML = `
    <div class="hero" onclick="openGame('dice')"><div style="font-size:36px;">🎲</div><h2>英皇娱乐·432.COM</h2><p>新人首存送8.8元</p><div class="cta">🔥 进入游戏大厅</div></div>
    <div class="game-grid">
      <div class="game-card" onclick="openGame('dice')"><div class="game-img">🎲</div><div class="game-name">摇骰子</div></div>
      <div class="game-card" onclick="openGame('slot')"><div class="game-img" style="background:linear-gradient(135deg,#101a2a,#182a3d)"><span class="hot">HOT</span>🎰</div><div class="game-name">老虎机</div></div>
      <div class="game-card" onclick="openGame('poker')"><div class="game-img" style="background:linear-gradient(135deg,#2a102a,#3d183d)">🃏</div><div class="game-name">扑克比点</div></div>
    </div>
    <div style="padding:6px 10px;color:#ffd700;font-weight:bold;">🎁 优惠</div>
    <div class="act-card" onclick="openRegister()"><span class="act-badge">🔥</span><b>新人首存</b></div>`;
}

function initNav() {
  document.getElementById('bottomNav').innerHTML = `
    <div class="nav-item active" data-page="home"><span class="nav-icon">🏠</span>首页</div>
    <div class="nav-item" data-page="activity"><span class="nav-icon">🎁</span>优惠</div>
    <div class="nav-item" data-page="earn"><span class="nav-icon">💼</span>赚钱</div>
    <div class="nav-item" data-page="stage"><span class="nav-icon">🎪</span>大舞台</div>
    <div class="nav-item" data-page="night"><span class="nav-icon">🌃</span>夜市</div>
    <div class="nav-item" data-page="room"><span class="nav-icon">💬</span>聊天室</div>
    <div class="nav-item" data-page="deposit"><span class="nav-icon">📥</span>存款</div>
    <div class="nav-item" data-page="profile"><span class="nav-icon">👤</span>我的</div>`;
  document.getElementById('bottomNav').addEventListener('click', function(e) {
    const nav = e.target.closest('.nav-item');
    if (!nav) return;
    const p = nav.dataset.page;
    if (p === 'deposit') { if (!currentUser) { showToast('请先登录'); return; } openDeposit(); }
    else switchPage(p);
    if (p === 'profile') {
      window._ac = (window._ac || 0) + 1;
      if (window._ac >= 5) { document.getElementById('pwdDialog').style.display = 'block'; window._ac = 0; }
    }
  });
}

function switchPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const m = {home:0, activity:1, earn:2, stage:3, night:4, room:5, deposit:6, profile:7};
  if (m[p] !== undefined) document.querySelectorAll('.nav-item')[m[p]].classList.add('active');
  if (p === 'home') renderHome();
  if (p === 'profile') renderProfile();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// 注册
function openRegister() {
  document.getElementById('registerModalContent').innerHTML = `
    <div class="modal-header"><h4>注册/登录</h4><button class="modal-close" onclick="closeModal('registerModal')">✕</button></div>
    <input class="input" id="regPhone" placeholder="手机号"><input class="input" id="regNickname" placeholder="昵称"><input class="input" id="regPassword" type="password" placeholder="密码">
    <button class="btn-block" onclick="doRegister()">注册</button><hr>
    <input class="input" id="switchPassword" type="password" placeholder="密码"><button class="btn-block" onclick="doSwitchUser()">切换</button>`;
  document.getElementById('registerModal').classList.add('show');
}

async function doRegister() {
  const ph = document.getElementById('regPhone').value.trim();
  const nn = document.getElementById('regNickname').value.trim();
  const pw = document.getElementById('regPassword').value.trim();
  if (!ph || !nn || !pw) return showToast('请填写完整');
  if (!/^1\d{10}$/.test(ph)) return showToast('手机号格式错误');
  const { data, error } = await supabase.from('users').insert([{user_id:'JK'+Math.random().toString(36).substr(2,6),nickname:nn,password:pw,phone:ph,balance:0,vip:0,total_bet:0}]).select();
  if (error) return showToast('注册失败: '+error.message);
  currentUser = data[0]; isLoggedIn = true;
  syncUI(); closeModal('registerModal'); switchPage('home');
  showToast('注册成功！'+nn);
}

async function doSwitchUser() {
  const pw = document.getElementById('switchPassword').value.trim();
  const { data, error } = await supabase.from('users').select('*');
  if (error) return showToast('查询失败');
  const u = data.find(user => user.password === pw);
  if (!u) return showToast('密码错误或用户不存在');
  currentUser = u; isLoggedIn = true;
  syncUI(); closeModal('registerModal'); switchPage('home');
  showToast('登录成功');
}

function syncUI() {
  if (currentUser) {
    document.getElementById('displayNickname').textContent = currentUser.nickname;
    document.getElementById('displayBalance').textContent = (currentUser.balance||0).toFixed(2);
    const v = Math.min(currentUser.vip||0, 10);
    document.getElementById('displayVip').textContent = VIP_NAMES[v];
    document.getElementById('avatarFrame').className = 'avatar-frame f' + v;
  }
}

// 游戏
function openGame(type) {
  if (!currentUser) return showToast('请先登录');
  const c = document.getElementById('gameModalContent');
  if (type === 'dice') {
    c.innerHTML = `<div class="modal-header"><h4>🎲 摇骰子</h4><button class="modal-close" onclick="closeModal('gameModal')">✕</button></div>
      <div class="dice-cube" id="diceCube"><div class="dice-face">⚀</div><div class="dice-face">⚁</div><div class="dice-face">⚂</div><div class="dice-face">⚃</div><div class="dice-face">⚄</div><div class="dice-face">⚅</div></div>
      <p id="diceRes">下注</p><button class="btn-block" onclick="playDice(10)">¥10</button>`;
    document.getElementById('gameModal').classList.add('show');
  }
}

async function playDice(bet) {
  if (currentUser.balance < bet) return showToast('余额不足');
  currentUser.balance -= bet;
  currentUser.total_bet = (currentUser.total_bet||0) + bet;
  document.getElementById('diceCube').classList.add('rolling');
  setTimeout(async () => {
    document.getElementById('diceCube').classList.remove('rolling');
    const p = Math.floor(Math.random()*6)+1, a = Math.floor(Math.random()*6)+1;
    document.getElementById('diceRes').textContent = `你:${p} AI:${a}`;
    if (p > a) { currentUser.balance += bet*2; document.getElementById('diceRes').textContent += ' 赢¥'+bet*2; }
    else if (p === a) { currentUser.balance += bet; document.getElementById('diceRes').textContent += ' 平'; }
    await supabase.from('users').update({balance:currentUser.balance,total_bet:currentUser.total_bet}).eq('user_id',currentUser.user_id);
    syncUI();
  }, 700);
}

// 管理员
function checkAdminPwd() {
  if (document.getElementById('pwdInput').value === 'LPTKJ') {
    document.getElementById('pwdDialog').style.display = 'none';
    openAdmin();
  } else showToast('密码错误');
}
function openAdmin() {
  document.getElementById('adminPanel').classList.add('show');
  document.getElementById('adminTabs').innerHTML = `<div class="admin-tab active" data-tab="users">用户</div><button class="btn-sm" style="background:#c92a2a;color:#fff;margin-left:auto;" onclick="closeAdmin()">关闭</button>`;
  switchAdminTab('users');
}
function closeAdmin() { document.getElementById('adminPanel').classList.remove('show'); }
async function switchAdminTab(tab) {
  const { data: users } = await supabase.from('users').select('*');
  document.getElementById('adminContent').innerHTML = users.map(u => `<div>${u.nickname} - 余额:¥${u.balance}</div>`).join('');
}
